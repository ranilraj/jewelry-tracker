<body>
  <div id="app"></div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="graph.js"></script>
  <script>
    // --- SUPABASE CONFIGURATION ---
    // 1. Replace these with your actual Supabase project URL and Anon Key
    const SUPABASE_URL = 'https://cnspaarxnigdglcvjghc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_FFtC1lxP8uCWuDBFQ1WGOA_N0rZS4rt';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ------------------------------

    const STAGE_COLORS = ['#fb923c', '#f97316', '#ea580c', '#c2410c', '#f59e0b', '#d97706', '#b45309', '#9a3412'];

    function fmt(n) { return Number(n).toLocaleString('en-IN'); }
    function sfmt(n) { n = parseFloat(n); if (isNaN(n)) return '0'; return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : fmt(n); }
    function parseDateObj(s) {
      if (!s) return new Date(NaN);
      if (s.includes('-')) {
        const p = s.split('-');
        if (p.length === 3) return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
        return new Date(s);
      }
      const parts = s.split('/');
      if (parts.length === 3) {
        let [d, m, y] = parts;
        if (y.length === 2) y = '20' + y;
        return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
      }
      return new Date(NaN);
    }
    function fmtDateUI(s) {
      const d = parseDateObj(s);
      if (isNaN(d)) return s;
      return d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }
    function toInputDate(s) {
      const d = parseDateObj(s);
      if (isNaN(d)) return '';
      return d.toLocaleDateString('en-CA'); // YYYY-MM-DD
    }

    function getDaysHTML(start, end, isDetail) {
      if (!start) return '';
      const d1 = parseDateObj(start);
      if (isNaN(d1)) return '';

      if (end) {
        const d2 = parseDateObj(end);
        if (!isNaN(d2)) {
          const days = Math.max(0, Math.round((d2 - d1) / (1000 * 60 * 60 * 24)));
          if (isDetail) return `<span style="color:#10b981;font-weight:bold;">TOOK ${days} DAYS TO COMPLETE</span>`;
          return `<span style="margin-left:8px;background:rgba(16,185,129,0.15);padding:2px 6px;border-radius:4px;color:#10b981;font-weight:bold;font-size:10px;">Took ${days} Days</span>`;
        }
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.max(0, Math.round((today - d1) / (1000 * 60 * 60 * 24)));
      if (isDetail) return `<span style="color:#f59e0b;font-weight:bold;">RUNNING DAY ${diff + 1}</span>`;
      return `<span style="margin-left:8px;background:rgba(245,158,11,0.15);padding:2px 6px;border-radius:4px;color:#f59e0b;font-weight:bold;font-size:10px;">Running Day ${diff + 1}</span>`;
    }
    function totalCost(st) {
      if (!Array.isArray(st)) return 0;
      return st.reduce((s, stg) => { const v = parseFloat(stg.cost); return s + (isNaN(v) ? 0 : v); }, 0);
    }
    function profPct(cost, sell) { cost = parseFloat(cost); sell = parseFloat(sell); if (!cost || !sell || isNaN(cost) || isNaN(sell)) return null; return ((sell - cost) / cost * 100); }

    // State
    let auth = localStorage.getItem('rj_auth') === '1';
    let batches = [];
    let view = 'list';
    let selId = null;
    let editMode = false;
    let draft = null;
    let newB = null;
    let delConf = false;
    let searchQuery = '';

    async function loadData() {
      try {
        const { data, error } = await sbClient
          .from('batches')
          .select('*')
          .order('id', { ascending: false });

        if (error) throw error;
        batches = data || [];
      } catch (err) {
        console.error('Error loading data:', err);
        batches = [];
      }
      render();
    }
    // saveData() removed, data is now saved directly to Supabase in actions

    function progBars(st) {
      if (!Array.isArray(st)) return '';
      const total = st.length;
      if (total === 0) return '';
      const filled = st.filter(s => s.cost !== '' && s.cost != null).length;
      const pct = (filled / total) * 100;
      let clr = '#38bdf8';
      if (pct > 20 && pct <= 50) clr = '#3b82f6';
      else if (pct > 50 && pct <= 80) clr = '#f97316';
      else if (pct > 80) clr = '#10b981';
      
      const tCost = totalCost(st);
      const avgCost = (tCost > 0 && filled > 0) ? (tCost / filled) : 1;

      return st.map((stage, i) => {
        const h = stage.cost !== '' && stage.cost != null;
        let flexVal = h ? (parseFloat(stage.cost) || 0) : avgCost;
        if (flexVal <= 0) flexVal = avgCost * 0.05 || 1;
        return `<div class="prog-bar" style="flex: ${flexVal}; background:${h ? clr : 'rgba(255,255,255,0.08)'}"></div>`;
      }).join('');
    }
    function pillsHTML(st) {
      if (!Array.isArray(st)) return '';
      return st.map((stage, i) => {
        const v = stage.cost; const h = v !== '' && v != null;
        const clr = STAGE_COLORS[i % STAGE_COLORS.length];
        const nameStr = (stage.name || 'Stage').substring(0, 3).toUpperCase();
        return `<span class="pill" style="background:${h ? clr + '22' : 'transparent'};color:${h ? clr : '#444'};border:1px solid ${h ? clr + '55' : '#222222'}">${nameStr}${h ? ' ₹' + sfmt(v) : ''}</span>`;
      }).join('');
    }
    function stagesFilled(st) { return Array.isArray(st) ? st.filter(s => s.cost !== '' && s.cost != null).length : 0; }
    function totalStages(st) { return Array.isArray(st) ? st.length : 0; }
    function badgeHTML(cost, sell) {
      const p = profPct(cost, sell); if (p === null) return '';
      const isP = p >= 0; const c = isP ? '#10b981' : '#ef4444';
      return `<span class="badge" style="background:${isP ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'};color:${c};border:1px solid ${c}">${isP ? '▲' : '▼'} ${Math.abs(p).toFixed(1)}%</span>`;
    }
    function profitCardHTML(st, selling, qty) {
      const cost = totalCost(st); const sell = parseFloat(selling);
      if (!cost || !sell || isNaN(sell)) return '';
      const profit = sell - cost; const pct = (profit / cost * 100); const isP = profit >= 0;
      const clr = isP ? '#10b981' : '#ef4444';
      let qrow = '';
      let profPerPcHTML = '';
      if (parseFloat(qty) > 0) {
        qrow = `<div class="prow"><span class="prow-lbl">Cost per piece (${fmt(qty)} pcs)</span><span class="prow-val-sm">₹${(cost / parseFloat(qty)).toFixed(2)}</span></div>`;
        profPerPcHTML = `<span style="color:#aaa;font-size:12px;font-family:monospace;margin-right:12px;">${isP ? '+' : '−'}₹${(Math.abs(profit) / parseFloat(qty)).toFixed(2)}/pc</span>`;
      }
      return `<div class="profit-card" style="background:${isP ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)'};border:1px solid ${isP ? '#10b98133' : '#ef444433'}">
    <div class="pgrid">
      <div><div class="plbl">TOTAL COST</div><div class="pval" style="color:#aaa">₹${fmt(cost)}</div></div>
      <div><div class="plbl">SELLING</div><div class="pval" style="color:#f59e0b">₹${fmt(sell)}</div></div>
      <div><div class="plbl">PROFIT %</div><div class="pval" style="color:${clr}">${isP ? '+' : ''}${pct.toFixed(1)}%</div></div>
    </div>
    <div class="pdiv">
      <div class="prow"><span class="prow-lbl">Net ${isP ? 'Profit' : 'Loss'}</span><div style="display:flex;align-items:center;">${profPerPcHTML}<span class="prow-val" style="color:${clr}">${isP ? '+' : '−'}₹${fmt(Math.abs(profit))}</span></div></div>
      ${qrow}
    </div>
  </div>`;
    }

    // Views
    function handleLogin() {

    function renderList() {
      const total = batches.length;
      const spend = batches.reduce((s, b) => s + totalCost(b.stages), 0);
      const pb = batches.filter(b => b.sellingPrice && totalCost(b.stages));
      const avg = pb.length ? pb.reduce((s, b) => { const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); return s + ((sp - c) / c * 100); }, 0) / pb.length : 0;
      const allNetProfit = pb.reduce((s, b) => { const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); return s + (sp - c); }, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const pb30 = pb.filter(b => {
        const d = parseDateObj(b.sellingDate || b.date);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });
      const netProfit30 = pb30.reduce((s, b) => { const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); return s + (sp - c); }, 0);
      let activeDays = 30;
      if (pb30.length > 0) {
        let earliest = today;
        pb30.forEach(b => {
          const d = parseDateObj(b.date);
          if (!isNaN(d) && d < earliest) earliest = d;
        });
        activeDays = Math.round((today - earliest) / (1000 * 60 * 60 * 24));
        if (activeDays > 30) activeDays = 30;
        if (activeDays < 1) activeDays = 1;
      } else {
        activeDays = 1;
      }
      const avgDailyProfit30 = netProfit30 / activeDays;

      const all30 = batches.filter(b => {
        const d = parseDateObj(b.date);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });
      const spend30 = all30.reduce((s, b) => s + totalCost(b.stages), 0);
      const avg30 = pb30.length ? pb30.reduce((s, b) => { const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); return s + ((sp - c) / c * 100); }, 0) / pb30.length : 0;

      const filteredBatches = batches.filter(b => {
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (b.name && b.name.toLowerCase().includes(q)) || (b.id && b.id.toString().includes(q));
      }).sort((a, b) => {
        const t1 = isNaN(parseDateObj(a.date)) ? 0 : parseDateObj(a.date).getTime();
        const t2 = isNaN(parseDateObj(b.date)) ? 0 : parseDateObj(b.date).getTime();
        return t1 === t2 ? b.id - a.id : t2 - t1;
      });
      const cards = filteredBatches.length === 0 ? (searchQuery ? `<div class="empty">No batches found.</div>` : `<div class="empty">No batches yet.<br/>Tap + New Batch to start.</div>`) :
        filteredBatches.map(b => {
          const cost = totalCost(b.stages); const sell = parseFloat(b.sellingPrice);
          const isCompleted = b.sellingDate && b.sellingPrice;
          const profitAmtHTML = (cost > 0 && sell > 0 && !isNaN(sell)) ? `<div style="font-family:monospace;font-size:11px;color:${sell - cost >= 0 ? '#10b981' : '#ef4444'};margin-top:2px">${sell - cost >= 0 ? '+' : '-'}₹${sfmt(Math.abs(sell - cost))}</div>` : '';
          return `<div class="bcard" style="border-left: 4px solid ${isCompleted ? '#10b981' : '#ef4444'}" onclick="openDetail(${b.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div><div style="color:#aaa;font-size:12px;font-family:monospace;margin-bottom:2px">#${b.id}</div><div class="bname">${b.name}</div><div class="bdate">${fmtDateUI(b.date)}${getDaysHTML(b.date, b.sellingDate, false)}</div></div>
          <div style="text-align:right">${badgeHTML(cost, sell)}${cost > 0 ? `<div style="font-family:monospace;font-size:11px;color:#888;margin-top:4px">Cost ₹${sfmt(cost)}</div>` : ''}${profitAmtHTML}
          </div>
        </div>
        <div class="pills">${pillsHTML(b.stages)}</div>
        <div class="prog">${progBars(b.stages)}</div>
        <div class="prog-lbl">${stagesFilled(b.stages)}/${totalStages(b.stages)} stages recorded</div>
      </div>`;
        }).join('');

      return `<div class="header">
    <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title">Batch Tracker</div></div>
    <button class="new-btn" onclick="goNew()">+ New Batch</button>
  </div>
  <div class="content">
    <div style="font-family:monospace;font-size:11px;color:#888;letter-spacing:1.5px;margin-bottom:10px;">LIFETIME STATS</div>
    <div class="stats" style="margin-bottom:24px;">
      <div class="stat"><div class="stat-lbl">BATCHES</div><div class="stat-val" style="color:#f59e0b">${total}</div></div>
      <div class="stat"><div class="stat-lbl">TOTAL SPEND</div><div class="stat-val" style="color:#f97316">₹${sfmt(spend)}</div></div>
      <div class="stat"><div class="stat-lbl">AVG MARGIN</div><div class="stat-val" style="color:${avg >= 0 ? '#10b981' : '#ef4444'}">${avg.toFixed(1)}%</div></div>
      <div class="stat"><div class="stat-lbl">TOTAL PROFIT</div><div class="stat-val" style="color:${allNetProfit >= 0 ? '#10b981' : '#ef4444'}">${allNetProfit >= 0 ? '+' : '-'}₹${sfmt(Math.abs(allNetProfit))}</div></div>
    </div>
    
    <div style="font-family:monospace;font-size:11px;color:#888;letter-spacing:1.5px;margin-bottom:10px;">LAST 30 DAYS</div>
    <div class="stats" style="margin-bottom:24px;">
      <div class="stat"><div class="stat-lbl">30D SPEND</div><div class="stat-val" style="color:#f97316">₹${sfmt(spend30)}</div></div>
      <div class="stat"><div class="stat-lbl">30D AVG MARGIN</div><div class="stat-val" style="color:${avg30 >= 0 ? '#10b981' : '#ef4444'}">${avg30.toFixed(1)}%</div></div>
      <div class="stat"><div class="stat-lbl">30D NET PROFIT</div><div class="stat-val" style="color:${netProfit30 >= 0 ? '#10b981' : '#ef4444'}">${netProfit30 >= 0 ? '+' : '-'}₹${sfmt(Math.abs(netProfit30))}</div></div>
      <div class="stat"><div class="stat-lbl">DAILY AVG PROFIT</div><div class="stat-val" style="color:${avgDailyProfit30 >= 0 ? '#10b981' : '#ef4444'}">${avgDailyProfit30 >= 0 ? '+' : '-'}₹${sfmt(Math.abs(avgDailyProfit30))}</div></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-family:monospace;font-size:11px;color:#888;letter-spacing:1.5px;">RECENT BATCHES</div>
      <input type="text" placeholder="Search ID or Name..." value="${searchQuery}" oninput="updateSearch(this.value)" style="background:#111;border:1px solid #222;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;width:180px;outline:none;" />
    </div>
    <div id="batch-cards">${cards}</div>
  </div>`;
    }

            ${(has && cost > 0) ? `<span style="color:#3b82f6; font-weight:bold; width:55px; text-align:center; display:inline-block;">${((parseFloat(val)/cost)*100).toFixed(1)}%</span>` : ''}

        ? `<div style="display:flex;align-items:center;gap:8px;"><span>START:</span> <input type="text" class="inp fp-date header-date-inp" data-placeholder="Start Date" placeholder="Start Date" value="${toInputDate(d.date)}" oninput="dr_set('date',this.value);"/></div>`
        : `<span>START: ${fmtDateUI(d.date)}</span>`}
      ${getDaysHTML(d.date, d.sellingDate, true)}

    // Actions
    function goList() { view = 'list'; selId = null; editMode = false; draft = null; delConf = false; render(); }
    function goNew() {
      newB = { name: '', date: new Date().toLocaleDateString('en-CA'), qty: '', stages: [], sellingPrice: '', sellingDate: '', notes: '' };
      view = 'new'; render();
    }
    function openDetail(id) { selId = id; editMode = false; draft = null; view = 'detail'; render(); }
    function startEdit() { const b = batches.find(x => x.id === selId); draft = { ...b, stages: JSON.parse(JSON.stringify(b.stages)) }; editMode = true; render(); }
    function cancelEdit() { editMode = false; draft = null; render(); }
    async function saveEdit() {
      try {
        const { error } = await sbClient.from('batches').update(draft).eq('id', draft.id);
        if (error) throw error;
        batches = batches.map(b => b.id === selId ? { ...draft } : b);
        editMode = false; draft = null; render();
      } catch (err) {
        console.error('Error saving edit:', err);
        alert('Failed to save to database. Check console for details.');
      }
    }
    function showDel() { delConf = true; render(); }
    function hideDel() { delConf = false; render(); }
    async function deleteBatch() {
      try {
        const { error } = await sbClient.from('batches').delete().eq('id', selId);
        if (error) throw error;
        batches = batches.filter(b => b.id !== selId);
        view = 'list'; selId = null; delConf = false; render();
      } catch (err) {
        console.error('Error deleting:', err);
        alert('Failed to delete from database. Check console for details.');
      }
    }

    function exportCSV() {
      const headers = ['ID', 'Name', 'Start Date', 'Completion Date', 'Quantity', 'Total Cost', 'Selling Price', 'Net Profit', 'Profit Margin (%)'];
      const rows = batches.map(b => {
        const cost = totalCost(b.stages);
        const sell = parseFloat(b.sellingPrice) || 0;
        const profit = sell - cost;
        const margin = cost ? ((profit / cost) * 100).toFixed(2) : 0;
        return [
          b.id,
          `"${(b.name || '').replace(/"/g, '""')}"`,
          b.date || '',
          b.sellingDate || '',
          b.qty || '',
          cost,
          sell,
          profit,
          margin
        ].join(',');
      });
      const csvContent = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `ranil_batches_${new Date().toISOString().split('T')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function updateSearch(val) {
      searchQuery = val;
      const q = val.toLowerCase();
      const filteredBatches = batches.filter(b => {
        if (!searchQuery) return true;
        return (b.name && b.name.toLowerCase().includes(q)) || (b.id && b.id.toString().includes(q));
      }).sort((a, b) => {
        const t1 = isNaN(parseDateObj(a.date)) ? 0 : parseDateObj(a.date).getTime();
        const t2 = isNaN(parseDateObj(b.date)) ? 0 : parseDateObj(b.date).getTime();
        return t1 === t2 ? b.id - a.id : t2 - t1;
      });
      const cards = filteredBatches.length === 0 ? (searchQuery ? `<div class="empty">No batches found.</div>` : `<div class="empty">No batches yet.<br/>Tap + New Batch to start.</div>`) :
        filteredBatches.map(b => {
          const cost = totalCost(b.stages); const sell = parseFloat(b.sellingPrice);
          const isCompleted = b.sellingDate && b.sellingPrice;
          const profitAmtHTML = (cost > 0 && sell > 0 && !isNaN(sell)) ? `<div style="font-family:monospace;font-size:11px;color:${sell - cost >= 0 ? '#10b981' : '#ef4444'};margin-top:2px">${sell - cost >= 0 ? '+' : '-'}₹${sfmt(Math.abs(sell - cost))}</div>` : '';
          return `<div class="bcard" style="border-left: 4px solid ${isCompleted ? '#10b981' : '#ef4444'}" onclick="openDetail(${b.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div><div style="color:#aaa;font-size:12px;font-family:monospace;margin-bottom:2px">#${b.id}</div><div class="bname">${b.name}</div><div class="bdate">${fmtDateUI(b.date)}${getDaysHTML(b.date, b.sellingDate, false)}</div></div>
          <div style="text-align:right">${badgeHTML(cost, sell)}${cost > 0 ? `<div style="font-family:monospace;font-size:11px;color:#888;margin-top:4px">Cost ₹${sfmt(cost)}</div>` : ''}${profitAmtHTML}
          </div>
        </div>
        <div class="pills">${pillsHTML(b.stages)}</div>
        <div class="prog">${progBars(b.stages)}</div>
        <div class="prog-lbl">${stagesFilled(b.stages)}/${totalStages(b.stages)} stages recorded</div>
      </div>`;
        }).join('');
      const container = document.getElementById('batch-cards');
      if (container) container.innerHTML = cards;
    }

    function nd_set(k, v) { if (newB) newB[k] = v; }
    function dr_set(k, v) { if (draft) draft[k] = v; }

    function addStage(isDraft) {
      const target = isDraft ? draft : newB;
      if (!target.stages) target.stages = [];
      target.stages.push({ name: '', cost: '', date: '' });
      render();
    }
    function removeStage(isDraft, idx) {
      const target = isDraft ? draft : newB;
      target.stages.splice(idx, 1);
      render();
    }
    function updateStageName(isDraft, idx, val) {
      const target = isDraft ? draft : newB;
      target.stages[idx].name = val;
    }
    function updateStageCost(isDraft, idx, val) {
      const target = isDraft ? draft : newB;
      target.stages[idx].cost = val;
    }
    function updateStageDate(isDraft, idx, val) {
      const target = isDraft ? draft : newB;
      target.stages[idx].date = val;
    }

    async function createBatch() {
      if (!newB || !newB.name.trim()) { alert('Enter order name'); return; }
      const newBatch = { ...newB, id: Date.now(), stages: JSON.parse(JSON.stringify(newB.stages)) };

      try {
        const { error } = await sbClient.from('batches').insert([newBatch]);
        if (error) throw error;
        batches = [newBatch, ...batches];
        view = 'list'; render();
      } catch (err) {
        console.error('Error creating batch:', err);
        alert('Failed to save to database. Check console for details.');
      }
    }

    function renderProfitEngine() {
      const today = new Date();
      today.setHours(0,0,0,0);
      
      const getProfit = (daysStart, daysEnd) => {
        const dStart = new Date(today); dStart.setDate(dStart.getDate() - daysStart);
        const dEnd = new Date(today); dEnd.setDate(dEnd.getDate() - daysEnd);
        return batches.filter(b => {
          if (!b.sellingDate || !b.sellingPrice) return false;
          const d = parseDateObj(b.sellingDate);
          return !isNaN(d) && d >= dStart && d < dEnd;
        }).reduce((s, b) => { 
          const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); 
          return s + (sp - c); 
        }, 0);
      };

      const p7 = getProfit(7, 0);
      const p7p = getProfit(14, 7);
      const p30 = getProfit(30, 0);
      const p30p = getProfit(60, 30);

      const calcG = (c, p) => p === 0 ? (c > 0 ? '+100.0%' : (c < 0 ? '-100.0%' : '0.0%')) : ((c - p) / Math.abs(p) * 100).toFixed(1) + '%';
      const wow = calcG(p7, p7p);
      const mom = calcG(p30, p30p);

      const wowIsP = parseFloat(wow) >= 0;
      const momIsP = parseFloat(mom) >= 0;

      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const pb30_arr = batches.filter(b => {
        if (!b.sellingPrice) return false;
        const d = parseDateObj(b.sellingDate || b.date);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });

      const netProfit30 = pb30_arr.reduce((s, b) => { const c = totalCost(b.stages), sp = parseFloat(b.sellingPrice); return s + (sp - c); }, 0);
      let activeDays = 30;
      if (pb30_arr.length > 0) {
        let earliest = today;
        pb30_arr.forEach(b => {
          const d = parseDateObj(b.date);
          if (!isNaN(d) && d < earliest) earliest = d;
        });
        activeDays = Math.round((today - earliest) / (1000 * 60 * 60 * 24));
        if (activeDays > 30) activeDays = 30;
        if (activeDays < 1) activeDays = 1;
      } else {
        activeDays = 1;
      }
      const avgDailyProfit30 = netProfit30 / activeDays;
      
      let velocityDays = '—';
      if (avgDailyProfit30 > 0) {
        velocityDays = Math.ceil(100000 / avgDailyProfit30) + ' Days';
      } else {
        velocityDays = 'Needs Profit';
      }

      return `<div class="header">
    <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title">Profit Engine</div></div>
  </div>
  <div class="content" style="padding-top:16px;">
    <div class="card">
      <div class="clbl" style="font-size:12px;margin-bottom:16px;color:#f59e0b;">PROFIT TREND</div>
      <div class="flex2" style="margin-bottom:16px;">
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">WOW GROWTH</div>
          <div style="font-weight:700;font-size:22px;color:${wowIsP ? '#10b981' : '#ef4444'};">${wowIsP ? '+' : ''}${wow}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">vs Last Week</div>
        </div>
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">MOM GROWTH</div>
          <div style="font-weight:700;font-size:22px;color:${momIsP ? '#10b981' : '#ef4444'};">${momIsP ? '+' : ''}${mom}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">vs Last Month</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="clbl" style="font-size:12px;margin-bottom:16px;color:#f59e0b;">VELOCITY (1 LAC)</div>
      <div class="flex2" style="margin-bottom:16px;">
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">AVG DAILY PROFIT</div>
          <div style="font-weight:700;font-size:20px;color:${avgDailyProfit30 > 0 ? '#10b981' : '#ef4444'};">₹${sfmt(Math.abs(avgDailyProfit30))}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">Last 30 Days</div>
        </div>
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">ESTIMATED TIME</div>
          <div style="font-weight:700;font-size:20px;color:#f59e0b;">${velocityDays}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">To reach ₹1,00,000</div>
        </div>
      </div>
    </div>
  </div>`;
    }

    function render() {
      let html = '';
      if (!auth) html = renderLogin();
      else if (view === 'list') html = renderList();
      else if (view === 'new') html = renderNew();
      else if (view === 'detail') html = renderDetail();
      else if (view === 'graph') html = typeof renderGraphView === 'function' ? renderGraphView(batches) : '<div class="empty">Loading...</div>';
      else if (view === 'profit_engine') html = renderProfitEngine();
      
      if (auth && (view === 'list' || view === 'graph' || view === 'profit_engine')) {
        html += `
          <div class="bottom-nav">
            <div class="nav-item ${view === 'list' ? 'active' : ''}" onclick="view='list';render()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
              <span>Batches</span>
            </div>
            <div class="nav-item ${view === 'graph' ? 'active' : ''}" onclick="view='graph';render()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
              <span>Analytics</span>
            </div>
            <div class="nav-item ${view === 'profit_engine' ? 'active' : ''}" onclick="view='profit_engine';render()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
              <span>Profit Engine</span>
            </div>
          </div>
        `;
      }
      
      document.getElementById('app').innerHTML = html;
      
      setTimeout(() => {
        if (view === 'graph' && typeof initCharts === 'function') {
          initCharts(batches);
        }
        flatpickr('.fp-date', {
          dateFormat: "Y-m-d",
          altInput: true,
          altFormat: "d-m-Y",
          disableMobile: true,
          onChange: function(selectedDates, dateStr, instance) {
            instance.element.value = dateStr;
            instance.element.dispatchEvent(new Event('input', { bubbles: true }));
          }
        });
      }, 0);
    }

    render();
    loadData();

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => { }); }
  </script>
</body>

</html>
