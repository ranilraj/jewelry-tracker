<body>
  <div id="app"></div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="graph.js"></script>
  <script>
    // --- SUPABASE CONFIGURATION ---
    // 1. Replace these with your actual Supabase project URL and Anon Key
    const SUPABASE_URL = 'https://cnspaarxnigdglcvjghc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_FFtC1lxP8uCWuDBFQ1WGOA_N0rZS4rt';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ------------------------------

    const STAGE_COLORS = ['#fb923c', '#f97316', '#ea580c', '#c2410c', '#f59e0b', '#d97706', '#b45309', '#9a3412'];

    function fmt(n) { return Number(n).toLocaleString('en-IN'); }
    function sfmt(n) { n = parseFloat(n); if (isNaN(n)) return '0'; return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : fmt(n); }
    function parseDateObj(s) {
      if (!s) return new Date(NaN);
      if (s.includes('-')) {
        const p = s.split('-');
        if (p.length === 3) return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
        return new Date(s);
      }
      const parts = s.split('/');
      if (parts.length === 3) {
        let [d, m, y] = parts;
        if (y.length === 2) y = '20' + y;
        return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
      }
      return new Date(NaN);
    }
    function fmtDateUI(s) {
      const d = parseDateObj(s);
      if (isNaN(d)) return s;
      return d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }
    function toInputDate(s) {
      const d = parseDateObj(s);
      if (isNaN(d)) return '';
      return d.toLocaleDateString('en-CA'); // YYYY-MM-DD
    }

    function getDaysHTML(start, end, isDetail) {
      if (!start) return '';
      const d1 = parseDateObj(start);
      if (isNaN(d1)) return '';

      if (end) {
        const d2 = parseDateObj(end);
        if (!isNaN(d2)) {
          const days = Math.max(0, Math.round((d2 - d1) / (1000 * 60 * 60 * 24)));
          if (isDetail) return `<span style="color:#10b981;font-weight:bold;">TOOK ${days} DAYS TO COMPLETE</span>`;
          return `<span style="margin-left:8px;background:rgba(16,185,129,0.15);padding:2px 6px;border-radius:4px;color:#10b981;font-weight:bold;font-size:10px;">Took ${days} Days</span>`;
        }
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.max(0, Math.round((today - d1) / (1000 * 60 * 60 * 24)));
      if (isDetail) return `<span style="color:#f59e0b;font-weight:bold;">RUNNING DAY ${diff + 1}</span>`;
      return `<span style="margin-left:8px;background:rgba(245,158,11,0.15);padding:2px 6px;border-radius:4px;color:#f59e0b;font-weight:bold;font-size:10px;">Running Day ${diff + 1}</span>`;
    }
    function getStageCost(stg) {
      if (stg.entries && stg.entries.length > 0) {
        return stg.entries.reduce((acc, e) => { const v = parseFloat(e.cost); return acc + (isNaN(v) ? 0 : v); }, 0);
      }
      const v = parseFloat(stg.cost); return isNaN(v) ? 0 : v;
    }
    function hasStageCost(stg) {
      if (stg.entries && stg.entries.length > 0) {
        return stg.entries.some(e => e.cost !== '' && e.cost != null);
      }
      return stg.cost !== '' && stg.cost != null;
    }
    function totalCost(st) {
      if (!Array.isArray(st)) return 0;
      return st.reduce((s, stg) => s + getStageCost(stg), 0);
    }
    function profPct(cost, sell) { cost = parseFloat(cost); sell = parseFloat(sell); if (!cost || !sell || isNaN(cost) || isNaN(sell)) return null; return ((sell - cost) / cost * 100); }

    function totalSalesRevenue(b) {
      if (!b.sales || !Array.isArray(b.sales)) return parseFloat(b.sellingPrice) || 0;
      return b.sales.reduce((acc, s) => acc + (parseFloat(s.price) || 0), 0);
    }
    function totalSoldQty(b) {
      if (!b.sales || !Array.isArray(b.sales)) return (b.sellingPrice && b.sellingDate) ? (parseFloat(b.qty) || 0) : 0;
      return b.sales.reduce((acc, s) => acc + (parseFloat(s.qty) || 0), 0);
    }

    // State
    let auth = localStorage.getItem('rj_auth') === '1';
    let batches = [];
    let view = 'list';
    let selId = null;
    let lastViewToken = null;
    let editMode = false;
    let draft = null;
    let newB = null;
    let delConf = false;
    let searchQuery = '';
    let quickAddStageIdx = null;
    let longPressTimer = null;
    let isSaving = false;
    let quickAddSaleBatchId = null;
    let quickAddCompId = null;

    // Local Persistence
    const LS_KEY_DRAFT = 'jewelry_draft_edit';
    const LS_KEY_NEW = 'jewelry_draft_new';
    const LS_KEY_STATE = 'jewelry_app_state';

    let lsTimer = null;
    function saveToLocal() {
      if (lsTimer) clearTimeout(lsTimer);
      lsTimer = setTimeout(() => {
        if (draft) localStorage.setItem(LS_KEY_DRAFT, JSON.stringify(draft));
        if (newB) localStorage.setItem(LS_KEY_NEW, JSON.stringify(newB));
        localStorage.setItem(LS_KEY_STATE, JSON.stringify({ view, selId, editMode }));
      }, 500); // Debounce 500ms
    }

    function clearLocal(key) {
      localStorage.removeItem(key);
    }

    function restoreFromLocal() {
      const savedNew = localStorage.getItem(LS_KEY_NEW);
      if (savedNew) {
        try { newB = JSON.parse(savedNew); } catch(e) {}
      }
      const savedDraft = localStorage.getItem(LS_KEY_DRAFT);
      if (savedDraft) {
        try { draft = JSON.parse(savedDraft); } catch(e) {}
      }
      const savedState = localStorage.getItem(LS_KEY_STATE);
      if (savedState) {
        try {
          const s = JSON.parse(savedState);
          view = s.view || 'list';
          selId = s.selId || null;
          editMode = s.editMode || false;
        } catch(e) {}
      }
    }

    async function loadData() {
      restoreFromLocal();
      try {
        const { data, error } = await sbClient
          .from('batches')
          .select('*')
          .order('id', { ascending: false });

        if (error) throw error;
        batches = (data || []).map(b => {
          if (b.stages) {
            b.stages.forEach(stg => {
              if (!stg.entries) {
                if (stg.cost !== undefined && stg.cost !== null && stg.cost !== '') {
                   stg.entries = [{cost: stg.cost, date: stg.date || ''}];
                } else {
                   stg.entries = [];
                }
              }
            });
          }
          // Migration for Sales
          if (!b.sales && b.sellingPrice) {
            b.sales = [{
              price: b.sellingPrice,
              date: b.sellingDate || b.date,
              qty: b.qty || 0,
              store: 'Initial Sale'
            }];
          }
          if (!b.sales) b.sales = [];
          return b;
        });
      } catch (err) {
        console.error('Error loading data:', err);
        batches = [];
      }
      render();
    }
    // saveData() removed, data is now saved directly to Supabase in actions

    function progBars(st) {
      if (!Array.isArray(st)) return '';
      const total = st.length;
      if (total === 0) return '';
      const filled = st.filter(s => hasStageCost(s)).length;
      const pct = (filled / total) * 100;
      let clr = '#38bdf8';
      if (pct > 20 && pct <= 50) clr = '#3b82f6';
      else if (pct > 50 && pct <= 80) clr = '#f97316';
      else if (pct > 80) clr = '#10b981';
      
      const tCost = totalCost(st);
      const avgCost = (tCost > 0 && filled > 0) ? (tCost / filled) : 1;

      return st.map((stage, i) => {
        const h = hasStageCost(stage);
        let flexVal = h ? getStageCost(stage) : avgCost;
        if (flexVal <= 0) flexVal = avgCost * 0.05 || 1;

    function renderList() {

      const pb = batches.filter(b => totalSalesRevenue(b) > 0);
      const avg = pb.length ? pb.reduce((s, b) => { const c = totalCost(b.stages), sp = totalSalesRevenue(b); return s + ((sp - c) / c * 100); }, 0) / pb.length : 0;
      const allNetProfit = pb.reduce((s, b) => { const c = totalCost(b.stages), sp = totalSalesRevenue(b); return s + (sp - c); }, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const pb30 = pb.filter(b => {
        const lastSaleDate = (b.sales && b.sales.length > 0) ? b.sales[b.sales.length-1].date : (b.sellingDate || b.date);
        const d = parseDateObj(lastSaleDate);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });
      const netProfit30 = pb30.reduce((s, b) => { const c = totalCost(b.stages), sp = totalSalesRevenue(b); return s + (sp - c); }, 0);
      const revenue30 = pb30.reduce((s, b) => s + totalSalesRevenue(b), 0);
      let activeDays = 30;
      if (pb30.length > 0) {
        let earliest = today;
        pb30.forEach(b => {
          const d = parseDateObj(b.date);
          if (!isNaN(d) && d < earliest) earliest = d;
        });
        activeDays = Math.round((today - earliest) / (1000 * 60 * 60 * 24));
        if (activeDays > 30) activeDays = 30;
        if (activeDays < 1) activeDays = 1;
      } else {
        activeDays = 1;
      }
      const avgDailyProfit30 = netProfit30 / activeDays;

      const all30 = batches.filter(b => {
        const d = parseDateObj(b.date);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });
      const spend30 = all30.reduce((s, b) => s + totalCost(b.stages), 0);
      const costOfSold30 = pb30.reduce((s, b) => s + totalCost(b.stages), 0);
      const profitPctOfRev30 = revenue30 ? (netProfit30 / revenue30 * 100) : 0;
      const makingPctOfRev30 = revenue30 ? (costOfSold30 / revenue30 * 100) : 0;
      const avg30 = pb30.length ? pb30.reduce((s, b) => { const c = totalCost(b.stages), sp = totalSalesRevenue(b); return s + ((sp - c) / c * 100); }, 0) / pb30.length : 0;

      const filteredBatches = batches.filter(b => {
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (b.name && b.name.toLowerCase().includes(q)) || (b.id && b.id.toString().includes(q));
      }).sort((a, b) => {
        const aSoldQty = totalSoldQty(a);

        const bComp = ((b.qty > 0 && bSoldQty >= b.qty) || b.sellingDate) ? 1 : 0;

              ${fmtDateUI(b.date)}${getDaysHTML(b.date, (isCompleted ? ((b.sales && b.sales.length > 0) ? b.sales[b.sales.length-1].date : b.sellingDate) : null), false)}

      </div>`;
        }).join('');

      return `<div class="header">

          <div class="snum" style="background:${has ? clr + '22' : '#111111'};border:1px solid ${has ? clr + '55' : '#222222'};color:${has ? clr : '#444'}">${i + 1}</div>

          <span class="sval" style="color:${has ? clr : '#333'}">${has ? '₹' + fmt(sCost) : '—'}</span>

        ${has ? `<div style="width:100%; padding-left:42px; display:flex; justify-content:space-between; align-items:center; font-size:12px; font-family:monospace; margin-top:4px; margin-bottom:4px;">
          <div style="display:flex; align-items:center;">
            ${(has && d.qty && parseFloat(d.qty) > 0) ? `<span style="color:#3b82f6; font-weight:800; font-size:13px; letter-spacing:0.5px; width:110px; display:inline-block; margin-right:10px;">₹${(parseFloat(sCost)/parseFloat(d.qty)).toFixed(2)}/pc</span>` : (has ? `<span style="width:110px; display:inline-block; margin-right:10px;"></span>` : '')}
            ${(has && cost > 0) ? `<span style="color:#3b82f6; font-weight:800; font-size:13px;">${((parseFloat(sCost)/cost)*100).toFixed(1)}%</span>` : ''}
          </div>
        </div>` : ''}
        ${viewEntriesHTML}
      </div>`;
        }
      }).join('');

      return `<div class="header">
    <button class="back-btn" onclick="goList()">←</button>
    <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title" style="font-size:14px"><span style="color:#aaa;font-size:12px;margin-right:6px">#${d.id}</span></div></div>
    <div style="display:flex;gap:8px">
      ${editMode
          ? `<button class="btn-cancel" onclick="cancelEdit()">Cancel</button><button class="btn-save" onclick="saveEdit()" ${isSaving ? 'disabled style="opacity:0.6"' : ''}>${isSaving ? 'Saving...' : 'Save'}</button>`
          : `<button class="btn-edit" onclick="startEdit()">✏️ Edit</button><button class="btn-del" onclick="showDel()">🗑</button>`}
    </div>
  </div>
  <div class="content" style="padding-top:16px">
    ${editMode ? `
    <div class="card">
      <label class="lbl">ORDER NAME</label>
      <input class="inp" placeholder="Order Name" value="${d.name}" oninput="dr_set('name',this.value)"/>
    </div>
    ` : `
    <div style="margin-bottom:14px;">
      <div style="font-size:18px;font-weight:700;">${d.name}</div>
    </div>
    `}
    <div style="font-family:monospace;font-size:11px;color:#666;letter-spacing:1.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
      ${editMode 
        ? `<div style="display:flex;align-items:center;gap:8px;"><span>START:</span> <input type="text" class="inp fp-date header-date-inp" data-placeholder="Start Date" placeholder="Start Date" value="${toInputDate(d.date)}" oninput="dr_set('date',this.value);"/></div>`
        : `<span>START: ${fmtDateUI(d.date)}</span>`}
      ${getDaysHTML(d.date, d.sellingDate, true)}
    </div>
    ${profitCardHTML(d)}
    <div class="card">
      <div class="clbl" style="display:flex; justify-content:space-between; align-items:center;">
        <span>STAGES & COSTS</span>
        ${editMode ? `<button class="btn-edit" onclick="addStage(true)">+ Add Stage</button>` : ''}
      </div>
      <div class="prog">${progBars(d.stages)}</div>
      <div class="prog-lbl" style="margin-bottom:12px">${stagesFilled(d.stages)}/${totalStages(d.stages)} stages recorded</div>
      ${stagesHTML}
      <div class="total-row"><span class="total-lbl">TOTAL COST</span><span class="total-val">₹${fmt(cost)}</span></div>
    </div>
    <div class="card">
      <div class="clbl" style="display:flex; justify-content:space-between; align-items:center;">
        <span>SALES & DISTRIBUTION</span>
        ${editMode ? `<button class="btn-edit" onclick="addSale(true)">+ Add Sale</button>` : ''}
      </div>
      <div style="font-family:monospace; font-size:12px; color:#aaa; margin-bottom:12px;">
        ${totalSoldQty(d)}/${d.qty || 0} pieces sold
        <div style="width:100%; height:4px; background:#222; border-radius:2px; margin-top:6px; overflow:hidden;">
          <div style="width:${Math.min(100, (totalSoldQty(d)/(d.qty||1))*100)}%; height:100%; background:#f59e0b;"></div>
        </div>
      </div>
      
      ${(!d.sales || d.sales.length === 0) ? `<div class="empty" style="padding:10px 0;">No sales recorded yet.</div>` : d.sales.map((sale, si) => {
        if (editMode) {
          return `<div style="padding:12px; background:#111; border-radius:8px; margin-bottom:8px; border:1px solid #222;">
            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <div style="flex:1;"><label class="lbl">QTY</label><input class="inp-sm" style="width:100%;" type="number" value="${sale.qty}" oninput="updateSale(true, ${si}, 'qty', this.value)"/></div>
              <div style="flex:2;"><label class="lbl">PRICE (₹)</label><input class="inp-sm" style="width:100%;" type="number" value="${sale.price}" oninput="updateSale(true, ${si}, 'price', this.value)"/></div>
              <button class="btn-del" style="height:36px; margin-top:18px;" onclick="removeSale(true, ${si})">✕</button>
            </div>
            <div style="display:flex; gap:8px;">
              <div style="flex:1;"><label class="lbl">DATE</label><input class="inp-sm fp-date" style="width:100%;" type="text" value="${toInputDate(sale.date)}" oninput="updateSale(true, ${si}, 'date', this.value)"/></div>
              <div style="flex:1;"><label class="lbl">STORE</label><input class="inp-sm" style="width:100%;" type="text" placeholder="Store name" value="${sale.store || ''}" oninput="updateSale(true, ${si}, 'store', this.value)"/></div>
            </div>
          </div>`;
        } else {
          return `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #111;">
            <div>
              <div style="font-weight:700; font-size:14px; color:#f59e0b;">₹${fmt(sale.price)}</div>
              <div style="font-size:11px; color:#666; font-family:monospace;">${sale.qty} pcs to ${sale.store || '—'}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:monospace; font-size:11px; color:#aaa;">${fmtDateUI(sale.date)}</div>
              <div style="font-family:monospace; font-size:10px; color:#666;">₹${(sale.price/sale.qty).toFixed(2)}/pc</div>
            </div>
          </div>`;
        }
      }).join('')}
    </div>
    <div class="card">
      <div class="clbl">BATCH INFO</div>
      <div class="flex2" style="margin-bottom:12px;">
        <div>
          <label class="lbl">TOTAL QTY (pcs)</label>
          ${editMode ? `<input class="inp" type="number" value="${d.qty}" placeholder="0" oninput="dr_set('qty',this.value)"/>`
          : `<div class="price-static" style="color:#aaa">${d.qty ? fmt(d.qty) + ' pcs' : '—'}</div>`}
        </div>
      </div>
      <div>
        <label class="lbl">COMPLETION DATE</label>
        ${editMode ? `<input class="inp fp-date" type="text" data-placeholder="Completion Date" placeholder="Completion Date" value="${toInputDate(d.sellingDate)}" oninput="dr_set('sellingDate',this.value);"/>`
          : `<div class="price-static" style="color:#aaa;font-size:14px;cursor:pointer;" 
               onmousedown="startCompPress(event, ${d.id})" 
               ontouchstart="startCompPress(event, ${d.id})" 
               onmouseup="endPress(event)" 
               ontouchend="endPress(event)" 
               oncontextmenu="handleCompContext(event, ${d.id})">
               ${fmtDateUI(d.sellingDate) || '—'}
             </div>`}
      </div>
    </div>
    ${(editMode || d.notes) ? `<div class="card"><div class="clbl">NOTES</div>
      ${editMode ? `<textarea class="inp" rows="3" placeholder="Any notes..." oninput="dr_set('notes',this.value)">${d.notes || ''}</textarea>`
            : `<p style="font-size:14px;color:#aaa;line-height:1.6">${d.notes}</p>`}
    </div>`: ''}
  </div>
  ${delConf ? `<div class="overlay" onclick="hideDel()">
    <div class="sheet" onclick="event.stopPropagation()">
      <h3>Delete Batch?</h3>
      <p>"${d.name}" will be permanently deleted.</p>
      <div class="btn-row">
        <button class="btn-ghost" onclick="hideDel()">Cancel</button>
        <button class="btn-del-confirm" onclick="deleteBatch()">Delete</button>
      </div>
    </div>
  </div>`: ''}
  ${quickAddStageIdx !== null ? `<div class="overlay" onclick="cancelQuickAdd()">
    <div class="sheet" onclick="event.stopPropagation()">
      <h3>Quick Add Amount</h3>
      <p>Add to <span style="color:#f59e0b;font-weight:bold">${d.stages[quickAddStageIdx].name || 'Stage'}</span></p>
      <div style="margin-bottom:16px;">
        <label class="lbl">DESCRIPTION</label>
        <input class="inp" id="qa_note" type="text" placeholder="e.g. Labor, Polish" style="margin-bottom:12px;"/>
        <label class="lbl">AMOUNT (₹)</label>
        <input class="inp" id="qa_amt" type="number" placeholder="Enter amount" style="margin-bottom:12px;"/>
        <label class="lbl">DATE</label>
        <input class="inp fp-date" id="qa_date" type="text" value="${new Date().toLocaleDateString('en-CA')}" placeholder="Date" />
      </div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="cancelQuickAdd()">Cancel</button>
        <button class="btn-gold" onclick="saveQuickAdd()" ${isSaving ? 'disabled style="opacity:0.6"' : ''}>${isSaving ? 'Saving...' : 'Save Amount'}</button>
      </div>
    </div>
  </div>`: ''}`;
    }

    // Actions
    function goList() { view = 'list'; selId = null; editMode = false; draft = null; delConf = false; clearLocal(LS_KEY_STATE); clearLocal(LS_KEY_DRAFT); clearLocal(LS_KEY_NEW); render(); }
    function goNew() {
      newB = {
        name: '',
        date: new Date().toLocaleDateString('en-CA'),
        qty: '',
        sellingDate: '',
        sales: [],
        stages: [
          { name: 'Casting', entries: [{ cost: '', date: '' }] },
          { name: 'Runner', entries: [{ cost: '', date: '' }] },
          { name: 'Cutting', entries: [{ cost: '', date: '' }] },
          { name: 'Stone', entries: [{ cost: '', date: '' }] },
          { name: 'Fitting', entries: [{ cost: '', date: '' }] },
          { name: 'Plating', entries: [{ cost: '', date: '' }] }
        ]
      };
      view = 'new';
      saveToLocal();
      render();
    }
    function openDetail(id) { selId = id; editMode = false; draft = null; view = 'detail'; saveToLocal(); render(); }
    function startEdit() { const b = batches.find(x => x.id === selId); 
      draft = JSON.parse(JSON.stringify(b));
      editMode = true;
      saveToLocal();
      render(); 
    }
    function cancelEdit() { editMode = false; draft = null; clearLocal(LS_KEY_DRAFT); render(); }
    async function saveEdit() {
      if (isSaving) return;
      try {
        isSaving = true;
        const { error } = await sbClient.from('batches').update(draft).eq('id', draft.id);
        if (error) throw error;
        batches = batches.map(b => b.id === selId ? { ...draft } : b);
        editMode = false; draft = null; clearLocal(LS_KEY_DRAFT); render();
      } catch (err) {
        console.error('Error saving edit:', err);
        alert('Failed to save to database. Check console for details.');
      } finally {
        isSaving = false;
      }
    }
    function showDel() { delConf = true; render(); }
    function hideDel() { delConf = false; render(); }
    async function deleteBatch() {
      try {
        const { error } = await sbClient.from('batches').delete().eq('id', selId);
        if (error) throw error;
        batches = batches.filter(b => b.id !== selId);
        view = 'list'; selId = null; delConf = false; render();
      } catch (err) {
        console.error('Error deleting:', err);
        alert('Failed to delete from database. Check console for details.');
      }
    }

    function exportCSV() {
      const headers = ['ID', 'Name', 'Start Date', 'Completion Date', 'Quantity', 'Total Cost', 'Selling Price', 'Net Profit', 'Profit Margin (%)'];
      const rows = batches.map(b => {
        const cost = totalCost(b.stages);
        const sell = totalSalesRevenue(b);
        const profit = sell - cost;
        const margin = cost ? ((profit / cost) * 100).toFixed(2) : 0;
        const lastSaleDate = (b.sales && b.sales.length > 0) ? b.sales[b.sales.length-1].date : '';
        return [
          b.id,
          `"${(b.name || '').replace(/"/g, '""')}"`,
          b.date || '',
          lastSaleDate,
          b.qty || '',
          cost,
          sell,
          profit,
          margin
        ].join(',');
      });
      const csvContent = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `ranil_batches_${new Date().toISOString().split('T')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function updateSearch(val) {
      searchQuery = val;
      const q = val.toLowerCase();
      const filteredBatches = batches.filter(b => {
        if (!searchQuery) return true;
        return (b.name && b.name.toLowerCase().includes(q)) || (b.id && b.id.toString().includes(q));
      }).sort((a, b) => {
        const aSoldQty = totalSoldQty(a);
        const bSoldQty = totalSoldQty(b);
        const aComp = ((a.qty > 0 && aSoldQty >= a.qty) || a.sellingDate) ? 1 : 0;
        const bComp = ((b.qty > 0 && bSoldQty >= b.qty) || b.sellingDate) ? 1 : 0;
        if (aComp !== bComp) return aComp - bComp;
        const dA = (aComp === 0) ? (parseDateObj(a.date).getTime() || 0) : (parseDateObj((a.sales && a.sales.length > 0) ? a.sales[a.sales.length-1].date : (a.sellingDate || a.date)).getTime() || 0);
        const dB = (bComp === 0) ? (parseDateObj(b.date).getTime() || 0) : (parseDateObj((b.sales && b.sales.length > 0) ? b.sales[b.sales.length-1].date : (b.sellingDate || b.date)).getTime() || 0);
        if (dA !== dB) return dB - dA;
        return b.id - a.id;
      });
      const cards = filteredBatches.length === 0 ? (searchQuery ? `<div class="empty">No batches found.</div>` : `<div class="empty">No batches yet.<br/>Tap + New Batch to start.</div>`) :
        filteredBatches.map(b => {
          const cost = totalCost(b.stages); const sell = totalSalesRevenue(b);
          const soldQty = totalSoldQty(b);
          const isCompleted = (b.qty > 0 && soldQty >= b.qty) || b.sellingDate;
          const profitAmtHTML = (cost > 0 && sell > 0) ? `<div style="font-family:monospace;font-size:11px;color:${sell - cost >= 0 ? '#10b981' : '#ef4444'};margin-top:2px">${sell - cost >= 0 ? '+' : '-'}₹${sfmt(Math.abs(sell - cost))}</div>` : '';
          return `<div class="bcard" style="border-left: 4px solid ${isCompleted ? '#10b981' : '#f59e0b'}" onclick="openDetail(${b.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div><div style="color:#aaa;font-size:12px;font-family:monospace;margin-bottom:2px">#${b.id}</div><div class="bname">${b.name}</div><div class="bdate" 
                 onmousedown="startCompPress(event, ${b.id})" 
                 ontouchstart="startCompPress(event, ${b.id})" 
                 onmouseup="endPress(event)" 
                 ontouchend="endPress(event)" 
                 oncontextmenu="handleCompContext(event, ${b.id})">
              ${fmtDateUI(b.date)}${getDaysHTML(b.date, (isCompleted ? ((b.sales && b.sales.length > 0) ? b.sales[b.sales.length-1].date : b.sellingDate) : null), false)}
            </div></div>
          <div style="text-align:right">${badgeHTML(cost, sell)}${cost > 0 ? `<div style="font-family:monospace;font-size:11px;color:#888;margin-top:4px">Cost ₹${sfmt(cost)}</div>` : ''}${profitAmtHTML}
          </div>
        </div>
        <div style="font-family:monospace;font-size:10px;color:#666;">${soldQty}/${b.qty || 0} pieces sold</div>
      </div>`;
        }).join('');
      const container = document.getElementById('batch-cards');
      if (container) container.innerHTML = cards;
    }

    function nd_set(k, v) { if (newB) { newB[k] = v; saveToLocal(); } }
    function dr_set(k, v) { if (draft) { draft[k] = v; saveToLocal(); } }

    function addStage(isDraft) {
      const target = isDraft ? draft : newB;
      if (!target.stages) target.stages = [];
      target.stages.push({ name: '', entries: [{ cost: '', date: '' }] });
      saveToLocal();
      render();
    }
    function removeStage(isDraft, idx) {
      if (!confirm('Are you sure you want to delete this entire stage?')) return;
      const target = isDraft ? draft : newB;
      target.stages.splice(idx, 1);
      saveToLocal();
      render();
    }
    function updateStageName(isDraft, idx, val) {
      const target = isDraft ? draft : newB;
      target.stages[idx].name = val;
      saveToLocal();
    }
    function addStageEntry(isDraft, idx) {
      const target = isDraft ? draft : newB;
      if (!target.stages[idx].entries) target.stages[idx].entries = [];
      target.stages[idx].entries.push({ cost: '', date: '' });
      saveToLocal();
      render();
    }
    function removeStageEntry(isDraft, stageIdx, entryIdx) {
      if (!confirm('Are you sure you want to delete this entry?')) return;
      const target = isDraft ? draft : newB;
      if (target.stages[stageIdx].entries) {
        target.stages[stageIdx].entries.splice(entryIdx, 1);
        if (target.stages[stageIdx].entries.length === 0) {
          target.stages[stageIdx].entries.push({ cost: '', date: '' });
        }
      }
      saveToLocal();
      render();
    }
    function updateStageCost(isDraft, stageIdx, entryIdx, val) {
      const target = isDraft ? draft : newB;
      if (!target.stages[stageIdx].entries) target.stages[stageIdx].entries = [{ cost: '', date: '' }];
      target.stages[stageIdx].entries[entryIdx].cost = val;
      saveToLocal();
    }
    function updateStageDate(isDraft, stageIdx, entryIdx, val) {
      const target = isDraft ? draft : newB;
      if (!target.stages[stageIdx].entries) target.stages[stageIdx].entries = [{ cost: '', date: '' }];
      target.stages[stageIdx].entries[entryIdx].date = val;
      saveToLocal();
    }
    function updateStageNote(isDraft, stageIdx, entryIdx, val) {
      const target = isDraft ? draft : newB;
      if (!target.stages[stageIdx].entries) target.stages[stageIdx].entries = [{ cost: '', date: '', note: '' }];
      target.stages[stageIdx].entries[entryIdx].note = val;
      saveToLocal();
    }

    function addSale(isDraft) {
      const target = isDraft ? draft : (view === 'new' ? newB : null);
      if (!target) return;
      if (!target.sales) target.sales = [];
      target.sales.push({ qty: '', price: '', date: new Date().toLocaleDateString('en-CA'), store: '' });
      saveToLocal();
      render();
    }
    function removeSale(isDraft, idx) {
      if (!confirm('Remove this sale record?')) return;
      const target = isDraft ? draft : (view === 'new' ? newB : null);
      if (!target) return;
      target.sales.splice(idx, 1);
      saveToLocal();
      render();
    }
    function updateSale(isDraft, idx, key, val) {
      const target = isDraft ? draft : (view === 'new' ? newB : null);
      if (!target) return;
      target.sales[idx][key] = val;
      saveToLocal();
    }

    function startCompPress(e, id) {
      if(editMode) return;
      e.stopPropagation();
      const el = e.currentTarget;
      el.style.backgroundColor = '#1a1a1a';
      longPressTimer = setTimeout(() => {
        el.style.backgroundColor = '';
        triggerQuickComp(id);
      }, 800);
    }
    function handleCompContext(e, id) {
      if(editMode) return;
      e.preventDefault(); e.stopPropagation();
      endPress(e);
      triggerQuickComp(id);
    }
    function triggerQuickComp(id) {
      if(editMode) return;
      quickAddCompId = id;
      render();
    }
    function cancelQuickComp() { quickAddCompId = null; render(); }
    async function saveQuickComp() {
      if (isSaving) return;
      const b = batches.find(x => x.id === quickAddCompId);
      if (!b) return;
      const date = document.getElementById('qc_date').value;
      if (!date) { alert('Select a date'); return; }
      
      const updatedB = { ...b, sellingDate: date };
      try {
        isSaving = true;
        const { error } = await sbClient.from('batches').update(updatedB).eq('id', b.id);
        if (error) throw error;
        batches = batches.map(x => x.id === b.id ? updatedB : x);
        quickAddCompId = null;
        render();
      } catch (err) {
        console.error('Error saving quick completion:', err);
        alert('Failed to save');
      } finally {
        isSaving = false;
      }
    }

    function renderQuickCompOverlay() {
      const b = batches.find(x => x.id === quickAddCompId);
      if (!b) return '';
      return `<div class="overlay" onclick="cancelQuickComp()">
        <div class="sheet" onclick="event.stopPropagation()">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3>Quick Completion</h3>
            <button class="btn-del" onclick="cancelQuickComp()">✕</button>
          </div>
          <p style="margin-bottom:16px; color:#aaa;">Mark <b>${b.name}</b> (#${b.id}) as completed.</p>
          <div style="margin-bottom:20px;">
            <label class="lbl">COMPLETION DATE</label>
            <input class="inp fp-date" id="qc_date" type="text" value="${new Date().toLocaleDateString('en-CA')}" placeholder="Select Date" />
          </div>
          <div class="btn-row">
            <button class="btn-ghost" style="flex:1" onclick="cancelQuickComp()">Cancel</button>
            <button class="btn-gold" style="flex:2" onclick="saveQuickComp()" ${isSaving ? 'disabled style="opacity:0.6"' : ''}>${isSaving ? 'Saving...' : 'Mark Completed'}</button>
          </div>
        </div>
      </div>`;
    }

    function startPress(e, idx) {
      if(editMode) return;
      const el = e.currentTarget;
      el.style.backgroundColor = '#1a1a1a';
      longPressTimer = setTimeout(() => {
        el.style.backgroundColor = '';
        triggerQuickAdd(idx);
      }, 800);
    }
    function endPress(e) {
      clearTimeout(longPressTimer);
      if(e.currentTarget) e.currentTarget.style.backgroundColor = '';
    }
    function handleContext(e, idx) {
      if(editMode) return;
      e.preventDefault();
      endPress(e);
      triggerQuickAdd(idx);
    }
    function triggerQuickAdd(idx) {
      if(editMode) return;
      quickAddStageIdx = idx;
      render();
    }
    function cancelQuickAdd() {
      quickAddStageIdx = null;
      render();
    }
    async function saveQuickAdd() {
      if (isSaving) return;
      const note = document.getElementById('qa_note').value;
      const amt = document.getElementById('qa_amt').value;
      const dt = document.getElementById('qa_date').value;
      if (!amt) { alert('Enter amount'); return; }
      const b = batches.find(x => x.id === selId);
      if (!b) return;
      const updatedB = JSON.parse(JSON.stringify(b));
      if (!updatedB.stages[quickAddStageIdx].entries) {
        updatedB.stages[quickAddStageIdx].entries = [];
        if (updatedB.stages[quickAddStageIdx].cost !== undefined && updatedB.stages[quickAddStageIdx].cost !== '') {
           updatedB.stages[quickAddStageIdx].entries.push({cost: updatedB.stages[quickAddStageIdx].cost, date: updatedB.stages[quickAddStageIdx].date || ''});
        }
      }
      updatedB.stages[quickAddStageIdx].entries.push({ cost: amt, date: dt, note: note });
      
      try {
        isSaving = true;
        const { error } = await sbClient.from('batches').update(updatedB).eq('id', updatedB.id);
        if (error) throw error;
        batches = batches.map(x => x.id === updatedB.id ? updatedB : x);
        quickAddStageIdx = null;
        render();
      } catch (err) {
        console.error('Error quick add:', err);
        alert('Failed to save amount');
      } finally {
        isSaving = false;
      }
    }

    async function createBatch() {
      if (isSaving) return;
      if (!newB || !newB.name.trim()) { alert('Enter order name'); return; }
      const newBatch = { ...newB, id: Date.now(), stages: JSON.parse(JSON.stringify(newB.stages)) };

      try {
        isSaving = true;
        render(); // Immediately show "Saving..." state
        const { error } = await sbClient.from('batches').insert([newBatch]);
        if (error) throw error;
        batches = [newBatch, ...batches];
        newB = null;
        clearLocal(LS_KEY_NEW);
        clearLocal(LS_KEY_STATE);
        view = 'list';
        render();
      } catch (err) {
        console.error('Error creating batch:', err);
        alert('Failed to save to database. Check console for details.');
      } finally {
        isSaving = false;
      }
    }

    function renderProfitEngine() {
      const today = new Date();
      today.setHours(0,0,0,0);
      
      const getProfit = (daysStart, daysEnd) => {
        const dStart = new Date(today); dStart.setDate(dStart.getDate() - daysStart);
        const dEnd = new Date(today); dEnd.setDate(dEnd.getDate() - daysEnd);
        return batches.filter(b => {
          if (!b.sellingDate || totalSalesRevenue(b) <= 0) return false;
          const d = parseDateObj(b.sellingDate);
          return !isNaN(d) && d >= dStart && d < dEnd;
        }).reduce((s, b) => { 
          const c = totalCost(b.stages), sp = totalSalesRevenue(b); 
          return s + (sp - c); 
        }, 0);
      };

      const p7 = getProfit(7, 0);
      const p7p = getProfit(14, 7);
      const p30 = getProfit(30, 0);
      const p30p = getProfit(60, 30);

      const calcG = (c, p) => p === 0 ? (c > 0 ? '+100.0%' : (c < 0 ? '-100.0%' : '0.0%')) : ((c - p) / Math.abs(p) * 100).toFixed(1) + '%';
      const wow = calcG(p7, p7p);
      const mom = calcG(p30, p30p);

      const wowIsP = parseFloat(wow) >= 0;
      const momIsP = parseFloat(mom) >= 0;

      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const pb30_arr = batches.filter(b => {
        if (totalSalesRevenue(b) <= 0) return false;
        const d = parseDateObj(b.sellingDate || b.date);
        return !isNaN(d) && d >= thirtyDaysAgo;
      });

      const netProfit30 = pb30_arr.reduce((s, b) => { const c = totalCost(b.stages), sp = totalSalesRevenue(b); return s + (sp - c); }, 0);
      let activeDays = 30;
      if (pb30_arr.length > 0) {
        let earliest = today;
        pb30_arr.forEach(b => {
          const d = parseDateObj(b.date);
          if (!isNaN(d) && d < earliest) earliest = d;
        });
        activeDays = Math.round((today - earliest) / (1000 * 60 * 60 * 24));
        if (activeDays > 30) activeDays = 30;
        if (activeDays < 1) activeDays = 1;
      } else {
        activeDays = 1;
      }
      const avgDailyProfit30 = netProfit30 / activeDays;
      
      let velocityDays = '—';
      if (avgDailyProfit30 > 0) {
        velocityDays = Math.ceil(100000 / avgDailyProfit30) + ' Days';
      } else {
        velocityDays = 'Needs Profit';
      }

      return `<div class="header">
    <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title">Profit Engine</div></div>
  </div>
  <div class="content" style="padding-top:16px;">
    <div class="card">
      <div class="clbl" style="font-size:12px;margin-bottom:16px;color:#f59e0b;">PROFIT TREND</div>
      <div class="flex2" style="margin-bottom:16px;">
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">WOW GROWTH</div>
          <div style="font-weight:700;font-size:22px;color:${wowIsP ? '#10b981' : '#ef4444'};">${wowIsP ? '+' : ''}${wow}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">vs Last Week</div>
        </div>
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">MOM GROWTH</div>
          <div style="font-weight:700;font-size:22px;color:${momIsP ? '#10b981' : '#ef4444'};">${momIsP ? '+' : ''}${mom}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">vs Last Month</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="clbl" style="font-size:12px;margin-bottom:16px;color:#f59e0b;">VELOCITY (1 LAC)</div>
      <div class="flex2" style="margin-bottom:16px;">
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">AVG DAILY PROFIT</div>
          <div style="font-weight:700;font-size:20px;color:${avgDailyProfit30 > 0 ? '#10b981' : '#ef4444'};">₹${sfmt(Math.abs(avgDailyProfit30))}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">Last 30 Days</div>
        </div>
        <div style="background:#111;padding:16px;border-radius:10px;border:1px solid #222;">
          <div style="font-family:monospace;font-size:10px;color:#888;margin-bottom:8px;">ESTIMATED TIME</div>
          <div style="font-weight:700;font-size:20px;color:#f59e0b;">${velocityDays}</div>
          <div style="font-family:monospace;font-size:10px;color:#555;margin-top:6px;">To reach ₹1,00,000</div>
        </div>
      </div>
    </div>
  </div>`;
    }

    function renderInventoryView() {
      const unsold = batches.filter(b => b.sellingDate && totalSoldQty(b) < (parseFloat(b.qty) || 0)).sort((a, b) => b.id - a.id);
      const cards = unsold.length === 0 ? `<div class="empty">No unsold inventory.</div>` :
        unsold.map(b => {
          const remaining = (parseFloat(b.qty) || 0) - totalSoldQty(b);
          return `<div class="bcard" onclick="openDetail(${b.id})">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div>
                <div style="color:#aaa;font-size:11px;font-family:monospace;margin-bottom:2px">#${b.id}</div>
                <div class="bname">${b.name}</div>
                <div class="bdate" style="color:#f59e0b">Remaining: ${remaining} pcs</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:monospace;font-size:11px;color:#666;">Total Qty: ${b.qty}</div>
                <div style="font-family:monospace;font-size:10px;color:#444;margin-top:4px;">${b.sellingDate ? 'Completed: ' + fmtDateUI(b.sellingDate) : 'Started: ' + fmtDateUI(b.date)}</div>
              </div>
            </div>
          </div>`;
        }).join('');

      return `<div class="header">
        <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title">Inventory (Unsold)</div></div>
      </div>
      <div class="content" style="padding-top:16px">${cards}</div>`;
    }

    function renderSalesView() {
      const allSales = [];
      batches.forEach(b => {
        if (b.sellingDate && b.sales && b.sales.length > 0) {
          b.sales.forEach(s => {
            allSales.push({ ...s, batchId: b.id, batchName: b.name });
          });
        }
      });
      allSales.sort((a, b) => parseDateObj(b.date) - parseDateObj(a.date));

      const cards = allSales.length === 0 ? `<div class="empty">No sales recorded.</div>` :
        allSales.map(s => `
          <div class="bcard" onclick="openDetail(${s.batchId})">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="flex:1">
                <div style="font-family:monospace;font-size:11px;color:#aaa;margin-bottom:4px;">${fmtDateUI(s.date)}</div>
                <div style="font-weight:700;font-size:14px;margin-bottom:2px;">${s.store || 'General Sale'}</div>
                <div style="font-family:monospace;font-size:11px;color:#666;">#${s.batchId} ${s.batchName}</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;font-size:16px;color:#10b981;">₹${fmt(s.price)}</div>
                <div style="font-family:monospace;font-size:11px;color:#aaa;margin-top:2px;">${s.qty} pcs @ ₹${(s.price/s.qty).toFixed(2)}</div>
              </div>
            </div>
          </div>
        `).join('');

      return `<div class="header">
        <div style="flex:1"><div class="brand">RANIL JEWELLERS</div><div class="title">Sales Ledger</div></div>
        <button class="new-btn" onclick="startQuickSale()">+ Add Sale</button>
      </div>
      <div class="content" style="padding-top:16px">
        ${cards}
      </div>
      ${quickAddSaleBatchId ? renderQuickSaleOverlay() : ''}`;
    }

    function renderQuickSaleOverlay() {
      if (quickAddSaleBatchId === true) {
        // Step 1: Select Batch
        const available = batches.filter(b => b.sellingDate && totalSoldQty(b) < (parseFloat(b.qty) || 0)).sort((a, b) => b.id - a.id);
        const list = available.length === 0 ? `<div class="empty">No batches with remaining stock.</div>` :
          available.map(b => `
            <div class="srow" style="padding:12px; border:1px solid #222; border-radius:8px; margin-bottom:8px; cursor:pointer;" onclick="quickAddSaleBatchId=${b.id};render()">
              <div style="font-family:monospace; font-size:11px; color:#aaa;">#${b.id}</div>
              <div style="font-weight:bold;">${b.name}</div>
              <div style="font-size:11px; color:#f59e0b;">${(parseFloat(b.qty)||0) - totalSoldQty(b)} pieces remaining</div>
            </div>
          `).join('');
          
        return `<div class="overlay" onclick="quickAddSaleBatchId=null;render()">
          <div class="sheet" onclick="event.stopPropagation()" style="max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <h3>Select Batch</h3>
              <button class="btn-del" onclick="quickAddSaleBatchId=null;render()">✕</button>
            </div>
            ${list}
          </div>
        </div>`;
      } else {
        // Step 2: Enter Sale Details
        const b = batches.find(x => x.id === quickAddSaleBatchId);
        if (!b) return '';
        const rem = (parseFloat(b.qty)||0) - totalSoldQty(b);
        return `<div class="overlay" onclick="quickAddSaleBatchId=null;render()">
          <div class="sheet" onclick="event.stopPropagation()">
            <h3>Add Sale for ${b.name}</h3>
            <p>Batch #${b.id} | <span style="color:#f59e0b">${rem} pieces available</span></p>
            <div style="margin-bottom:16px;">
              <div class="flex2" style="margin-bottom:12px;">
                <div><label class="lbl">QTY (max ${rem})</label><input class="inp" id="qs_qty" type="number" value="${rem}" /></div>
                <div><label class="lbl">TOTAL PRICE (₹)</label><input class="inp" id="qs_price" type="number" placeholder="Enter amount" /></div>
              </div>
              <label class="lbl">STORE / CUSTOMER</label>
              <input class="inp" id="qs_store" type="text" placeholder="Store name" style="margin-bottom:12px;"/>
              <label class="lbl">DATE</label>
              <input class="inp fp-date" id="qs_date" type="text" value="${new Date().toLocaleDateString('en-CA')}" placeholder="Date" />
            </div>
            <div class="btn-row">
              <button class="btn-ghost" onclick="quickAddSaleBatchId=true;render()">← Back</button>
              <button class="btn-gold" onclick="saveQuickSale()" ${isSaving ? 'disabled style="opacity:0.6"' : ''}>${isSaving ? 'Saving...' : 'Save Sale'}</button>
            </div>
          </div>
        </div>`;
      }
    }

    function startQuickSale() {
      quickAddSaleBatchId = true;
      render();
    }

    async function saveQuickSale() {
      if (isSaving) return;
      const b = batches.find(x => x.id === quickAddSaleBatchId);
      if (!b) return;

      const qty = parseFloat(document.getElementById('qs_qty').value);
      const price = parseFloat(document.getElementById('qs_price').value);
      const date = document.getElementById('qs_date').value;
      const store = document.getElementById('qs_store').value;

      if (!qty || !price) { alert('Enter quantity and price'); return; }
      const rem = (parseFloat(b.qty)||0) - totalSoldQty(b);
      if (qty > rem) { alert('Quantity exceeds remaining stock!'); return; }

      const updatedB = JSON.parse(JSON.stringify(b));
      if (!updatedB.sales) updatedB.sales = [];
      updatedB.sales.push({ qty, price, date, store });

      try {
        isSaving = true;
        const { error } = await sbClient.from('batches').update(updatedB).eq('id', b.id);
        if (error) throw error;
        batches = batches.map(x => x.id === b.id ? updatedB : x);
        quickAddSaleBatchId = null;
        render();
      } catch (err) {
        console.error('Error saving quick sale:', err);
        alert('Failed to save sale');
      } finally {
        isSaving = false;
      }
    }

    function render() {
      const currentToken = view + (selId || '');
      if (lastViewToken !== currentToken) {
        window.scrollTo(0, 0);
        lastViewToken = currentToken;
      }
      let html = '';
      if (!auth) html = renderLogin();
      else if (view === 'list') html = renderList();
      else if (view === 'new') html = renderNew();
      else if (view === 'detail') html = renderDetail();
      else if (view === 'graph') html = typeof renderGraphView === 'function' ? renderGraphView(batches) : '<div class="empty">Loading...</div>';
      else if (view === 'profit_engine') html = renderProfitEngine();
      else if (view === 'inventory') html = renderInventoryView();
      else if (view === 'sales') html = renderSalesView();
      
      if (auth && (view === 'list' || view === 'graph' || view === 'profit_engine' || view === 'inventory' || view === 'sales')) {
        html += `
          <div class="bottom-nav">
            <div class="nav-item ${view === 'list' ? 'active' : ''}" onclick="view='list';render()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
              <span>Batches</span>
            </div>
            <div class="nav-item ${view === 'inventory' ? 'active' : ''}" onclick="view='inventory';render()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
              <span>Stock</span>
            </div>
            <div class="nav-item ${view === 'sales' ? 'active' : ''}" onclick="view='sales';render()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              <span>Sales</span>
            </div>
            <div class="nav-item ${view === 'graph' ? 'active' : ''}" onclick="view='graph';render()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
              <span>Analytics</span>
            </div>
            <div class="nav-item ${view === 'profit_engine' ? 'active' : ''}" onclick="view='profit_engine';render()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
              <span>Engine</span>
            </div>
          </div>
        `;
      }
      
      if (quickAddCompId !== null) html += renderQuickCompOverlay();
      document.getElementById('app').innerHTML = html;
      
      setTimeout(() => {
        if (view === 'graph' && typeof initCharts === 'function') {
          initCharts(batches);
        }
        flatpickr('.fp-date', {
          dateFormat: "Y-m-d",
          altInput: true,
          altFormat: "d-m-Y",
          disableMobile: true,
          onChange: function(selectedDates, dateStr, instance) {
            instance.element.value = dateStr;
            instance.element.dispatchEvent(new Event('input', { bubbles: true }));
          }
        });
      }, 0);
    }

    render();
    loadData();

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => { }); }
  </script>
</body>

</html>
